<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>友趣校园</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script src="./js/api.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }

    /* 加载状态 */
    .loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; background: #f5f5f5; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: #3054EB; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== 首页样式 ========== */
    .community-container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }
    .banner-swiper { height: 180px; overflow: hidden; }
    .banner-slide { height: 180px; background: #f5f5f5; }
    .banner-image { width: 100%; height: 100%; object-fit: cover; }
    .category-scroll { background: #fff; padding: 10px 0; border-bottom: 1px solid #eee; white-space: nowrap; overflow-x: auto; }
    .category-list { display: flex; padding: 0 10px; }
    .category-item { flex-shrink: 0; padding: 6px 16px; margin-right: 10px; border-radius: 16px; font-size: 14px; color: #666; background: #f5f5f5; cursor: pointer; }
    .category-item.active { background: #3054EB; color: #fff; }
    .posts-list { padding: 10px; padding-bottom: 60px; }
    .post-card { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; gap: 10px; cursor: pointer; }
    .post-cover { width: 120px; height: 90px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    .post-cover img { width: 100%; height: 100%; object-fit: cover; }
    .post-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .post-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
    .post-title { flex: 1; font-size: 15px; font-weight: 600; color: #333; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .bounty-info { display: flex; align-items: center; flex-shrink: 0; }
    .bounty-tag { font-size: 12px; color: #FF9800; }
    .bounty-amount { font-size: 14px; color: #FF5722; font-weight: 600; }
    .post-desc { font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 6px; }
    .post-header { display: flex; align-items: center; gap: 6px; margin-top: auto; }
    .author-avatar { width: 20px; height: 20px; border-radius: 50%; }
    .author-name { font-size: 12px; color: #333; }
    .post-time { font-size: 10px; color: #999; margin-left: 6px; }
    .post-category { padding: 3px 6px; border-radius: 4px; font-size: 10px; }
    .post-category.bounty { background: #FFF3E0; color: #FF9800; }
    .post-category.qa { background: #E3F2FD; color: #2196F3; }
    .post-category.rant { background: #FCE4EC; color: #E91E63; }
    .post-footer { display: flex; padding-top: 6px; border-top: 1px solid #f0f0f0; margin-top: 6px; }
    .footer-item { display: flex; align-items: center; margin-right: 16px; color: #999; font-size: 12px; }
    .float-publish-btn { position: fixed; right: 15px; bottom: 70px; width: 50px; height: 50px; background: linear-gradient(135deg, #3054EB, #4A7AF7); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(48, 84, 235, 0.4); z-index: 100; cursor: pointer; }
    .publish-icon { color: #fff; font-size: 24px; }
    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }

    /* ========== 底部导航 ========== */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 999; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: #3054EB; }
    .nav-icon { width: 24px; height: 24px; margin-bottom: 2px; }

    /* ========== 详情页样式 ========== */
    .detail-container { min-height: 100vh; background: #fff; padding-bottom: 60px; }
    .detail-images { width: 100%; height: 300px; position: relative; overflow: hidden; }
    .detail-image { width: 100%; height: 300px; object-fit: cover; cursor: pointer; }
    .detail-body { padding: 15px; }
    .detail-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 12px; line-height: 1.4; }
    .detail-content { font-size: 15px; color: #666; line-height: 1.6; }
    .detail-header { display: flex; align-items: center; padding: 12px 15px; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
    .detail-avatar { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    .detail-author-info { flex: 1; margin-left: 10px; cursor: pointer; }
    .detail-author-name { font-size: 15px; color: #333; font-weight: 500; }
    .detail-post-time { font-size: 12px; color: #999; margin-top: 2px; }
    .follow-btn { padding: 6px 16px; border-radius: 16px; font-size: 14px; cursor: pointer; background: #3054EB; color: #fff; }
    .follow-btn.following { background: #f5f5f5; color: #999; }
    .bounty-box { background: #FFF3E0; padding: 12px 15px; margin: 10px 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
    .bounty-left { display: flex; align-items: center; }
    .take-btn { padding: 8px 16px; background: #FF9800; color: #fff; border-radius: 4px; font-size: 14px; cursor: pointer; }
    .action-bar { display: flex; padding: 15px; border-top: 1px solid #f0f0f0; }
    .action-item { flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 14px; color: #666; cursor: pointer; }
    .action-item.active { color: #E91E63; }
    .comments-section { padding: 15px; background: #f5f5f5; }
    .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px; }
    .comment-item { display: flex; background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
    .comment-avatar { width: 32px; height: 32px; border-radius: 50%; }
    .comment-body { flex: 1; margin-left: 10px; }
    .comment-author { font-size: 14px; color: #333; font-weight: 500; }
    .comment-time { font-size: 12px; color: #999; margin-left: 8px; }
    .comment-content { font-size: 14px; color: #666; margin-top: 6px; line-height: 1.5; }
    .comment-input-box { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #fff; display: flex; align-items: center; padding: 0 10px; border-top: 1px solid #eee; z-index: 99; }
    .comment-input { flex: 1; height: 36px; border: 1px solid #ddd; border-radius: 18px; padding: 0 12px; font-size: 14px; outline: none; }
    .send-btn { width: 60px; height: 36px; background: #3054EB; color: #fff; border-radius: 18px; font-size: 14px; margin-left: 10px; cursor: pointer; border: none; }
    .no-comment { text-align: center; padding: 20px; color: #999; font-size: 14px; }

    /* ========== 消息页样式 ========== */
    .messages-container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
    .tab-item { flex: 1; text-align: center; padding: 14px; font-size: 15px; color: #666; cursor: pointer; position: relative; }
    .tab-item.active { color: #3054EB; font-weight: 500; }
    .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: #3054EB; }
    .message-list { padding: 10px; }
    .message-item { display: flex; align-items: center; background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
    .msg-avatar { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
    .msg-body { flex: 1; margin-left: 12px; min-width: 0; }
    .msg-header { display: flex; align-items: center; justify-content: space-between; }
    .msg-sender { font-size: 15px; color: #333; font-weight: 500; }
    .msg-time { font-size: 12px; color: #999; }
    .msg-content { font-size: 14px; color: #666; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-tag { display: inline-block; padding: 2px 6px; background: #FFF3E0; color: #FF9800; border-radius: 4px; font-size: 12px; margin-right: 6px; }

    /* ========== 我的页样式 ========== */
    .profile-container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }
    .profile-header { background: linear-gradient(135deg, #3054EB, #4A7AF7); padding: 30px 20px; text-align: center; position: relative; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-bottom: 12px; cursor: pointer; }
    .profile-nickname { font-size: 20px; color: #fff; font-weight: 600; margin-bottom: 4px; }
    .profile-stats { display: flex; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 15px; margin-top: 15px; }
    .stat-item { flex: 1; text-align: center; cursor: pointer; }
    .stat-num { font-size: 22px; color: #fff; font-weight: 600; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; }
    .login-btn { padding: 12px 24px; background: #fff; color: #3054EB; border-radius: 24px; font-size: 16px; cursor: pointer; border: none; margin-top: 12px; }
    .menu-list { padding: 15px; }
    .menu-item { display: flex; align-items: center; background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
    .menu-icon { font-size: 20px; margin-right: 12px; }
    .menu-text { flex: 1; font-size: 15px; color: #333; }
    .menu-arrow { font-size: 14px; color: #999; }

    /* ========== 发布页样式 ========== */
    .publish-container { min-height: 100vh; background: #fff; padding-bottom: 60px; }
    .publish-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
    .header-back { font-size: 16px; color: #333; cursor: pointer; }
    .header-title { font-size: 18px; font-weight: 600; color: #333; }
    .form { padding: 15px; }
    .form-item { margin-bottom: 20px; }
    .label { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 10px; display: block; }
    .category-btns { display: flex; gap: 10px; }
    .category-btn { padding: 8px 16px; border-radius: 16px; font-size: 14px; color: #666; background: #f5f5f5; cursor: pointer; }
    .category-btn.active { background: #3054EB; color: #fff; }
    .task-types { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .task-type-btn { padding: 8px 16px; border-radius: 16px; font-size: 14px; color: #666; background: #f5f5f5; cursor: pointer; }
    .task-type-btn.active { background: #FF9800; color: #fff; }
    .input { width: 100%; height: 44px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; font-size: 15px; outline: none; }
    .textarea { width: 100%; min-height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 15px; outline: none; resize: none; }
    .image-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .image-item { width: 80px; height: 80px; border-radius: 8px; position: relative; overflow: hidden; }
    .image-item img { width: 100%; height: 100%; object-fit: cover; }
    .add-image { width: 80px; height: 80px; border-radius: 8px; border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #999; cursor: pointer; }
    .submit-btn { width: 100%; height: 44px; background: #3054EB; color: #fff; border-radius: 8px; font-size: 16px; cursor: pointer; border: none; margin-top: 20px; }
    .tip { font-size: 12px; color: #999; margin-top: 6px; }

    /* ========== 用户空间样式 ========== */
    .space-container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }
    .space-header { background: linear-gradient(135deg, #3054EB, #4A7AF7); padding: 30px 20px; text-align: center; }
    .space-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-bottom: 12px; }
    .space-nickname { font-size: 20px; color: #fff; font-weight: 600; margin-bottom: 4px; }
    .space-tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
    .space-posts-list { padding: 10px; }

    /* ========== 培训页样式 ========== */
    .training-container { min-height: 100vh; background: #f5f5f5; padding-bottom: 20px; }
    .training-header { padding: 12px 15px; background: #3054EB; color: #fff; }
    .training-title { font-size: 18px; font-weight: 600; }
    .stats-card { display: flex; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 10px; margin-top: 10px; }
    .stat-item-training { flex: 1; text-align: center; }
    .stat-value { font-size: 20px; font-weight: 600; }
    .stat-label { font-size: 11px; opacity: 0.8; }
    .quick-actions { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin: 10px 15px; }
    .action-item { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .action-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 4px; background: #E3F2FD; }
    .action-text { font-size: 12px; color: #666; }
    .course-card { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin: 10px 15px 8px; cursor: pointer; }
    .course-icon { width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #f5f5f5; margin-right: 10px; }
    .course-info { flex: 1; }
    .course-title { font-size: 14px; font-weight: 500; color: #333; }
    .course-status { font-size: 10px; padding: 2px 6px; border-radius: 2px; background: #E91E63; color: #fff; }
    .login-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .login-modal.show { display: flex; }
    .login-box { background: #fff; border-radius: 12px; padding: 24px; width: 280px; text-align: center; }
    .login-box-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; }
    .login-input { width: 100%; height: 44px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
    .login-btn { width: 100%; height: 44px; background: #3054EB; color: #fff; border-radius: 8px; font-size: 16px; border: none; cursor: pointer; margin-top: 8px; }
    .login-close { font-size: 12px; color: #999; margin-top: 16px; cursor: pointer; }
    .login-error { display: none; color: #E91E63; font-size: 13px; margin-top: 12px; }
    .login-error.show { display: block; }
    .footer-text { text-align: center; padding: 20px; color: #999; font-size: 11px; }
  </style>
</head>

<body>
  <!-- 加载状态 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div>加载中...</div>
  </div>

  <!-- 页面容器 -->
  <div id="appContainer"></div>

  <!-- 登录弹窗（培训页用） -->
  <div class="login-modal" id="loginModal">
    <div class="login-box">
      <div class="login-box-title">员工登录</div>
      <input type="text" class="login-input" id="empId" placeholder="请输入员工号" maxlength="20">
      <input type="password" class="login-input" id="empPwd" placeholder="请输入密码" maxlength="20">
      <button class="login-btn" onclick="doFakeLogin()">登录</button>
      <div class="login-error" id="loginError">员工号或密码错误</div>
      <div class="login-close" onclick="hideLoginModal()">取消</div>
    </div>
  </div>

  <!-- 评论输入框（详情页用） -->
  <div class="comment-input-box" id="commentInputBox" style="display: none;">
    <input class="comment-input" placeholder="说点什么..." id="commentInput">
    <button class="send-btn" onclick="submitComment()">发送</button>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav" id="bottomNav" style="display: none;">
    <div class="nav-item active" id="navHome" onclick="navigate('home')">
      <img class="nav-icon" src="images/home_fill.png" alt="首页">
      <span>首页</span>
    </div>
    <div class="nav-item" id="navMessages" onclick="navigate('messages')">
      <img class="nav-icon" src="images/mark.png" alt="消息">
      <span>消息</span>
    </div>
    <div class="nav-item" id="navProfile" onclick="navigate('profile')">
      <img class="nav-icon" src="images/people.png" alt="我的">
      <span>我的</span>
    </div>
  </div>

  <script>
    // ========== 用户信息（全局） ==========
    let userInfo = null;

    function getHashParams() {
      const hash = window.location.hash.slice(1);
      if (!hash) return {};
      const params = {};
      hash.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    function updateHash(params) {
      const hash = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join('&');
      window.location.hash = hash;
    }

    // ========== 小程序通信 ==========
    function isInMiniProgram() {
      return (
        window.__wxjs_environment === 'miniprogram' ||
        (window.wx && window.wx.miniProgram) ||
        /miniProgram/i.test(navigator.userAgent)
      );
    }

    function postMessage(data) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.postMessage({ data });
      }
    }

    // 等待小程序 API 准备好
    function ensureMiniProgramReady() {
      return new Promise((resolve) => {
        if (window.wx && window.wx.miniProgram) {
          resolve();
          return;
        }

        let tries = 0;
        const timer = setInterval(() => {
          tries += 1;
          if (window.wx && window.wx.miniProgram) {
            clearInterval(timer);
            resolve();
            return;
          }
          if (tries >= 20) {
            clearInterval(timer);
            resolve();
          }
        }, 100);
      });
    }

    // 跳转小程序页面（实时）
    function navigateMiniProgram(url) {
      console.log('[SPA] navigateMiniProgram:', url);

      if (!isInMiniProgram()) {
        console.log('[SPA] 不在小程序环境');
        alert('请在微信小程序中打开');
        return;
      }

      ensureMiniProgramReady().then(() => {
        console.log('[SPA] miniProgram ready, wx.miniProgram:', window.wx?.miniProgram);
        if (window.wx && window.wx.miniProgram && typeof window.wx.miniProgram.navigateTo === 'function') {
          console.log('[SPA] 调用 wx.miniProgram.navigateTo:', url);
          window.wx.miniProgram.navigateTo({ url });
        } else {
          console.log('[SPA] wx.miniProgram.navigateTo 不可用');
        }
      });
    }

    // ========== 路由控制 ==========
    let currentPage = 'home';
    let currentData = {};

    // 初始化用户信息（从 hash 获取并查询完整信息）
    async function initUserInfo() {
      const hashParams = getHashParams();
      console.log('[SPA] hashParams:', hashParams);

      if (hashParams.openid && hashParams.userId) {
        // 设置基本 userInfo
        userInfo = { openid: hashParams.openid, id: hashParams.userId };
        console.log('[SPA] 基本 userInfo:', userInfo);

        // 查询完整用户信息
        try {
          const userRes = await window.API.getUserInfo(hashParams.userId);
          if (userRes.success && userRes.data) {
            userInfo = {
              openid: hashParams.openid,
              id: hashParams.userId,
              nickname: userRes.data.nickname || userRes.data.name || '用户',
              avatar: userRes.data.avatar || 'https://fp1.mingdaoyun.cn/customIcon/0_lego.svg'
            };
            console.log('[SPA] 完整 userInfo:', userInfo);
          }
        } catch (e) {
          console.log('[SPA] 获取用户信息失败:', e);
        }
      }

      return userInfo;
    }

    async function initApp() {
      console.log('[SPA] initApp 开始');

      // 初始化用户信息
      await initUserInfo();

      // 获取审核状态
      const configRes = await window.API.getSysConfig();
      const auditMode = configRes.success && configRes.isSpecialMode;

      console.log('[SPA] auditMode:', auditMode);

      const hashParams = getHashParams();

      // 根据审核状态决定初始页面
      if (auditMode) {
        currentPage = 'training';
      } else {
        // 检查 hash 中的 page 参数
        if (hashParams.page) {
          currentPage = hashParams.page;
          if (hashParams.id) currentData.id = hashParams.id;
          if (hashParams.userId) currentData.userId = hashParams.userId;
          if (hashParams.cat) currentData.cat = hashParams.cat;
        } else {
          currentPage = 'home';
        }
      }

      // 渲染页面
      await renderPage();
    }

    // 监听 hash 变化（小程序返回时会触发）
    window.addEventListener('hashchange', async function() {
      console.log('[SPA] hashchange 触发');
      const oldUserInfo = userInfo;

      // 重新初始化用户信息
      await initUserInfo();

      // 如果用户信息有变化，重新渲染当前页面
      if (oldUserInfo?.openid !== userInfo?.openid || oldUserInfo?.id !== userInfo?.id) {
        console.log('[SPA] 用户信息变化，重新渲染');
        await renderPage();
      }
    });

    // 页面跳转
    function navigate(page, data = {}) {
      console.log('[SPA] navigate:', page, data);
      currentPage = page;
      currentData = data;

      const hashParams = { page };
      if (userInfo?.openid) hashParams.openid = userInfo.openid;
      if (userInfo?.id) hashParams.userId = userInfo.id;
      if (data.id) hashParams.id = data.id;

      if (data.cat) hashParams.cat = data.cat;

      updateHash(hashParams);
      renderPage();
    }

    async function renderPage() {
      const container = document.getElementById('appContainer');
      const loading = document.getElementById('loadingScreen');
      const bottomNav = document.getElementById('bottomNav');
      const commentInput = document.getElementById('commentInputBox');

      loading.style.display = 'none';
      commentInput.style.display = 'none';

      console.log('[SPA] renderPage:', currentPage);

      // 更新底部导航状态
      bottomNav.style.display = 'flex';
      document.getElementById('navHome').classList.toggle('active', currentPage === 'home');
      document.getElementById('navMessages').classList.toggle('active', currentPage === 'messages');
      document.getElementById('navProfile').classList.toggle('active', currentPage === 'profile');

      // 更新导航图标
      document.getElementById('navHome').querySelector('.nav-icon').src = currentPage === 'home' ? 'images/home_fill.png' : 'images/home.png';
      document.getElementById('navMessages').querySelector('.nav-icon').src = currentPage === 'messages' ? 'images/mark_fill.png' : 'images/mark.png';
      document.getElementById('navProfile').querySelector('.nav-icon').src = currentPage === 'profile' ? 'images/people_fill.png' : 'images/people.png';

      switch (currentPage) {
        case 'home':
          await renderHomePage(container);
          break;
        case 'training':
          renderTrainingPage(container);
          bottomNav.style.display = 'none';
          break;
        case 'detail':
          await renderDetailPage(container, currentData.id);
          commentInput.style.display = 'flex';
          bottomNav.style.display = 'none';
          break;
        case 'messages':
          await renderMessagesPage(container);
          break;
        case 'profile':
          await renderProfilePage(container);
          break;
        case 'publish':
          renderPublishPage(container);
          bottomNav.style.display = 'none';
          break;
        case 'space':
          await renderSpacePage(container, currentData.userId);
          bottomNav.style.display = 'none';
          break;
        default:
          await renderHomePage(container);
      }
    }

    async function submitComment() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;

      if (!userInfo) {
        navigateMiniProgram('/pages/login/index');
        return;
      }

      const res = await window.API.addComment({ post_id: detailPost.id, content: text }, userInfo);
      if (res.success) {
        input.value = '';

        await loadComments(detailPost.id);
        document.getElementById('commentsList').innerHTML = renderComments();

            <div class="action-item" onclick="showLoginModal()"><div class="action-icon">📖</div><div class="action-text">课程中心</div></div>
            <div class="action-item" onclick="showLoginModal()"><div class="action-icon">📝</div><div class="action-text">在线考试</div></div>
            <div class="action-item" onclick="showLoginModal()"><div class="action-icon">📋</div><div class="action-text">学习记录</div></div>
          </div>
          ${courses.map(c => `
            <div class="course-card" onclick="showLoginModal()">
              <div class="course-icon">${c.icon}</div>
              <div class="course-info">
                <div class="course-title">${c.title}</div>
                <span class="course-status">必修</span>
              </div>
            </div>
          `).join('')}
          <div class="footer-text">友趣科技有限公司 © 2024</div>
        </div>
      `;
    }

    function showLoginModal() {
      document.getElementById('loginModal').classList.add('show');
      document.getElementById('empId').value = '';
      document.getElementById('empPwd').value = '';
      document.getElementById('loginError').classList.remove('show');
    }

    function hideLoginModal() {
      document.getElementById('loginModal').classList.remove('show');
    }

    function doFakeLogin() {
      document.getElementById('loginError').classList.add('show');
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>

</html>
