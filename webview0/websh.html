<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>友趣校园</title>

  <!-- JSSDK -->
  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>

  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <div class="container">
    <!-- 轮播图 -->
    <swiper class="banner-swiper" id="bannerSwiper">
      <!-- 轮播内容由 JS 渲染 -->
    </swiper>

    <!-- 分类导航 -->
    <scroll-view class="category-scroll" scroll-x>
      <view class="category-list" id="categoryList">
        <!-- 分类由 JS 渲染 -->
      </view>
    </scroll-view>

    <!-- 帖子列表 -->
    <view class="posts-list" id="postsList">
      <!-- 帖子由 JS 渲染 -->
    </view>

    <!-- 悬浮发布按钮 -->
    <view class="float-publish-btn" onclick="goToPublish()">
      <text class="publish-icon">+</text>
    </view>

    <!-- 底部导航 -->
    <view class="bottom-nav">
      <view class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <text>首页</text>
      </view>
      <view class="nav-item" onclick="switchNav('messages')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
        <text>消息</text>
      </view>
      <view class="nav-item" onclick="switchNav('profile')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <text>我的</text>
      </view>
    </view>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/app.js"></script>
  <script>
    // 社区页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      initCommunityPage();
    });

    let currentCategory = '';
    let page = 1;
    let hasMore = true;
    let loading = false;

    async function initCommunityPage() {
      // 加载轮播图
      await loadBanners();

      // 加载分类
      renderCategories();

      // 加载帖子
      await loadPosts();
    }

    // 渲染分类
    function renderCategories() {
      const categories = [
        { id: '', name: '全部' },
        { id: '赏金任务', name: '赏金任务' },
        { id: '问答', name: '问答' },
        { id: '吐槽', name: '吐槽' }
      ];

      const categoryList = document.getElementById('categoryList');
      categoryList.innerHTML = categories.map(cat => `
        <view class="category-item ${cat.id === currentCategory ? 'active' : ''}" onclick="switchCategory('${cat.id}')">
          ${cat.name}
        </view>
      `).join('');
    }

    // 加载轮播图
    async function loadBanners() {
      const res = await window.API.getBanners();
      const bannerSwiper = document.getElementById('bannerSwiper');

      if (res.success && res.data.length > 0) {
        bannerSwiper.innerHTML = res.data.map(banner => `
          <swiper-item onclick="onBannerTap('${banner.link_type}', '${banner.link_target}')">
            <image class="banner-image" src="${banner.image}" mode="aspectFill"></image>
          </swiper-item>
        `).join('');
      } else {
        bannerSwiper.innerHTML = `
          <swiper-item>
            <image class="banner-image" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg" mode="aspectFill"></image>
          </swiper-item>
        `;
      }
    }

    // 加载帖子
    async function loadPosts(loadMore = false) {
      if (loading || (!loadMore && !hasMore)) return;

      loading = true;
      if (!loadMore) {
        document.getElementById('postsList').innerHTML = '<view class="loading"><text>加载中...</text></view>';
      }

      const nextPage = loadMore ? page + 1 : 1;
      const res = await window.API.getPosts(currentCategory, nextPage, 10);

      if (res.success) {
        const posts = res.data;
        const postsList = document.getElementById('postsList');

        if (loadMore) {
          postsList.innerHTML += renderPostsHTML(posts);
        } else {
          postsList.innerHTML = renderPostsHTML(posts);
        }

        page = nextPage;
        hasMore = posts.length >= 10;
      } else {
        document.getElementById('postsList').innerHTML = '<view class="loading"><text>加载失败</text></view>';
      }

      if (!hasMore) {
        document.getElementById('postsList').innerHTML += '<view class="no-more"><text>没有更多了</text></view>';
      }

      loading = false;
    }

    // 渲染帖子 HTML
    function renderPostsHTML(posts) {
      return posts.map(post => `
        <view class="post-card" onclick="goToDetail('${post.id}')">
          ${post.cover ? `
            <view class="post-cover">
              <image class="cover-image" src="${post.cover}" mode="aspectFill"></image>
            </view>
          ` : ''}
          <view class="post-main">
            <view class="post-title-row">
              <text class="post-title">${post.title}</text>
              ${post.category === '赏金任务' ? `
                <view class="bounty-info">
                  <text class="bounty-tag">【${post.task_type}】</text>
                  <text class="bounty-amount">¥${post.bounty_amount}</text>
                </view>
              ` : ''}
            </view>
            <view class="post-desc-wrap">
              <text class="post-desc">${post.content}</text>
            </view>
            <view class="post-header">
              <image class="author-avatar" src="${post.author.avatar}"></image>
              <view class="author-info">
                <text class="author-name">${post.author.nickname}</text>
                <text class="post-time">${post.created_at}</text>
              </view>
              <view class="post-category ${post.category === '赏金任务' ? 'bounty' : post.category === '问答' ? 'qa' : 'rant'}">${post.category}</view>
            </view>
            <view class="post-footer">
              <view class="footer-item">
                <text class="icon">👍</text>
                <text>${post.likes_count}</text>
              </view>
              <view class="footer-item">
                <text class="icon">💬</text>
                <text>${post.comments_count}</text>
              </view>
              <view class="footer-item">
                <text class="icon">👁️</text>
                <text>${post.views_count || 0}</text>
              </view>
            </view>
          </view>
        </view>
      `).join('');
    }

    // 切换分类
    function switchCategory(category) {
      currentCategory = category;
      page = 1;
      hasMore = true;
      renderCategories();
      loadPosts();
    }

    // 轮播图点击
    function onBannerTap(linkType, linkTarget) {
      if (linkType === '内容' && linkTarget) {
        goToDetail(linkTarget);
      }
    }

    // 帖子详情
    function goToDetail(postId) {
      if (window.webview && window.webview.isInMiniProgram()) {
        window.webview.navigateTo('/pages/post/post?id=' + postId);
      } else {
        window.location.href = './pages/post.html?id=' + postId;
      }
    }

    // 发布页面
    function goToPublish() {
      if (window.webview && window.webview.isInMiniProgram()) {
        window.webview.navigateTo('/pages/publish/publish');
      } else {
        window.location.href = './pages/publish.html';
      }
    }

    // 切换导航
    function switchNav(tab) {
      if (window.webview && window.webview.isInMiniProgram()) {
        const tabMap = {
          'messages': '/pages/messages/messages',
          'profile': '/pages/profile/profile'
        };
        if (tabMap[tab]) {
          window.webview.switchTab(tabMap[tab]);
        }
      } else {
        window.location.href = './pages/' + tab + '.html';
      }
    }

    // 轮播图点击
    function onBannerTap(linkType, linkTarget) {
      if (linkType === '内容' && linkTarget) {
        goToDetail(linkTarget);
      }
    }
  </script>
</body>

</html>
