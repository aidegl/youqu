<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>友趣校园</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }

    /* 轮播图 */
    .banner-swiper { height: 180px; overflow: hidden; position: relative; }
    .banner-slide { height: 180px; background: #f5f5f5; cursor: pointer; }
    .banner-image { width: 100%; height: 100%; object-fit: cover; }
    .banner-loading { height: 180px; display: flex; align-items: center; justify-content: center; color: #999; }

    /* 分类导航 */
    .category-scroll { background: #fff; padding: 10px 0; border-bottom: 1px solid #eee; white-space: nowrap; overflow-x: auto; }
    .category-list { display: flex; padding: 0 10px; }
    .category-item { flex-shrink: 0; padding: 6px 16px; margin-right: 10px; border-radius: 16px; font-size: 14px; color: #666; background: #f5f5f5; cursor: pointer; }
    .category-item.active { background: #3054EB; color: #fff; }

    /* 帖子列表 */
    .posts-list { padding: 10px; }
    .post-card { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; gap: 10px; cursor: pointer; }
    .post-cover { width: 120px; height: 90px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    .post-cover img { width: 100%; height: 100%; object-fit: cover; }
    .post-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .post-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
    .post-title { flex: 1; font-size: 15px; font-weight: 600; color: #333; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .bounty-info { display: flex; align-items: center; flex-shrink: 0; }
    .bounty-tag { font-size: 12px; color: #FF9800; }
    .bounty-amount { font-size: 14px; color: #FF5722; font-weight: 600; }

    .post-desc-wrap { margin-bottom: 6px; }
    .post-desc { font-size: 12px; color: #666; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .post-header { display: flex; align-items: center; gap: 6px; margin-top: auto; }
    .author-avatar { width: 20px; height: 20px; border-radius: 50%; }
    .author-info { flex: 1; }
    .author-name { font-size: 12px; color: #333; }
    .post-time { font-size: 10px; color: #999; margin-left: 6px; }
    .post-category { padding: 3px 6px; border-radius: 4px; font-size: 10px; }
    .post-category.bounty { background: #FFF3E0; color: #FF9800; }
    .post-category.qa { background: #E3F2FD; color: #2196F3; }
    .post-category.rant { background: #FCE4EC; color: #E91E63; }

    .post-footer { display: flex; padding-top: 6px; border-top: 1px solid #f0f0f0; margin-top: 6px; }
    .footer-item { display: flex; align-items: center; margin-right: 16px; color: #999; font-size: 12px; }

    /* 悬浮发布按钮 */
    .float-publish-btn { position: fixed; right: 15px; bottom: 70px; width: 50px; height: 50px; background: linear-gradient(135deg, #3054EB, #4A7AF7); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(48, 84, 235, 0.4); z-index: 100; cursor: pointer; }
    .publish-icon { color: #fff; font-size: 24px; }

    /* 底部导航 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 99; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: #3054EB; }
    .nav-icon { width: 20px; height: 20px; margin-bottom: 2px; }

    /* 加载状态 */
    .loading, .no-more { text-align: center; padding: 15px; color: #999; font-size: 13px; }
    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
  </style>
</head>

<body>
  <div class="container" id="appContainer">
    <!-- 轮播图 -->
    <div class="banner-swiper" id="bannerSwiper">
      <div class="banner-loading">加载中...</div>
    </div>

    <!-- 分类导航 -->
    <div class="category-scroll">
      <div class="category-list" id="categoryList"></div>
    </div>

    <!-- 帖子列表 -->
    <div class="posts-list" id="postsList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- 悬浮发布按钮 -->
  <div class="float-publish-btn" onclick="goToPublish()">
    <div class="publish-icon">+</div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-item active" id="navHome">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item" id="navMessages" onclick="switchTab('messages')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <span>消息</span>
    </div>
    <div class="nav-item" id="navProfile" onclick="switchTab('profile')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>我的</span>
    </div>
  </div>

  <script>
    // ========== 环境检测和通信 ==========

    function isInMiniProgram() {
      return window.__wxjs_environment === 'miniprogram' || (window.wx && window.wx.miniProgram);
    }

    function postMessage(data) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.postMessage({ data });
        console.log('[H5] 发送消息到小程序:', data);
      }
    }

    function navigateTo(url) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.navigateTo({ url });
      } else {
        window.location.href = url;
      }
    }

    function navigateBack() {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.navigateBack();
      } else {
        window.history.back();
      }
    }

    // ========== 用户信息（从 hash 获取） ==========

    let userInfo = null;

    function getHashParams() {
      const hash = window.location.hash.slice(1);
      if (!hash) return {};
      const params = {};
      hash.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    function getQueryParams() {
      const search = window.location.search.slice(1);
      if (!search) return {};
      const params = {};
      search.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    function initUserInfo() {
      const hashParams = getHashParams();
      if (hashParams.openid) {
        userInfo = { openid: hashParams.openid, id: hashParams.userId };
        console.log('[H5] 从 hash 获取 openid:', hashParams.openid, 'userId:', hashParams.userId);
      }
    }

    // 监听 hash 变化
    window.addEventListener('hashchange', () => {
      initUserInfo();
      console.log('[H5] hash 变化，userInfo:', userInfo);
    });

    // ========== 页面初始化 ==========

    let currentCategory = '';
    let page = 1;
    let hasMore = true;
    let loading = false;

    document.addEventListener('DOMContentLoaded', async function() {
      initUserInfo();

      await loadBanners();
      renderCategories();
      await loadPosts();
    });

    // ========== 数据加载 ==========

    async function loadBanners() {
      const res = await window.API.getBanners();
      const swiper = document.getElementById('bannerSwiper');

      if (res.success && res.data.length > 0) {
        swiper.innerHTML = res.data.map(b => `
          <div class="banner-slide" onclick="onBannerTap('${b.link_type}', '${b.link_target}')">
            <img class="banner-image" src="${b.image}" alt="banner">
          </div>
        `).join('');
      } else {
        swiper.innerHTML = '<div class="banner-slide"><img class="banner-image" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg" alt="banner"></div>';
      }
    }

    function renderCategories() {
      const categories = [
        { id: '', name: '全部' },
        { id: '赏金任务', name: '赏金任务' },
        { id: '问答', name: '问答' },
        { id: '吐槽', name: '吐槽' }
      ];

      const list = document.getElementById('categoryList');
      list.innerHTML = categories.map(c => `
        <div class="category-item ${c.id === currentCategory ? 'active' : ''}" onclick="switchCategory('${c.id}')">${c.name}</div>
      `).join('');
    }

    async function loadPosts(loadMore = false) {
      if (loading) return;
      if (loadMore && !hasMore) return;

      loading = true;
      const list = document.getElementById('postsList');

      if (!loadMore) {
        list.innerHTML = '<div class="loading">加载中...</div>';
        page = 1;
      }

      const res = await window.API.getPosts(currentCategory, page, 10);

      if (res.success && res.data.length > 0) {
        const posts = res.data;
        hasMore = posts.length >= 10;

        let html = posts.map(post => `
          <div class="post-card" onclick="goToDetail('${post.id}')">
            ${post.cover ? `<div class="post-cover"><img src="${post.cover}" alt="cover"></div>` : ''}
            <div class="post-main">
              <div class="post-title-row">
                <div class="post-title">${post.title}</div>
                ${post.category === '赏金任务' ? `<div class="bounty-info"><span class="bounty-tag">【${post.task_type}】</span><span class="bounty-amount">¥${post.bounty_amount}</span></div>` : ''}
              </div>
              <div class="post-desc-wrap"><div class="post-desc">${post.content}</div></div>
              <div class="post-header">
                <img class="author-avatar" src="${post.author.avatar}" alt="avatar">
                <div class="author-info">
                  <span class="author-name">${post.author.nickname}</span>
                  <span class="post-time">${post.created_at}</span>
                </div>
                <span class="post-category ${post.category === '赏金任务' ? 'bounty' : post.category === '问答' ? 'qa' : 'rant'}">${post.category}</span>
              </div>
              <div class="post-footer">
                <div class="footer-item">👍 ${post.likes_count}</div>
                <div class="footer-item">💬 ${post.comments_count}</div>
                <div class="footer-item">👁️ ${post.views_count || 0}</div>
              </div>
            </div>
          </div>
        `).join('');

        if (loadMore) {
          // 移除旧的"没有更多了"提示，追加新内容
          const existingContent = list.innerHTML.replace('<div class="no-more">没有更多了</div>', '');
          list.innerHTML = existingContent + html;
        } else {
          list.innerHTML = html;
        }

        if (!hasMore) {
          list.innerHTML += '<div class="no-more">没有更多了</div>';
        }

        page++;
      } else {
        if (!loadMore) {
          list.innerHTML = '<div class="empty">暂无内容</div>';
        }
        hasMore = false;
      }

      loading = false;
    }

    function switchCategory(cat) {
      currentCategory = cat;
      hasMore = true;
      renderCategories();
      loadPosts();
    }

    // ========== 功能跳转 ==========

    function onBannerTap(type, target) {
      if (type === '内容' && target) goToDetail(target);
    }

    function goToDetail(id) {
      if (isInMiniProgram()) {
        navigateTo('/pages/post/post?id=' + id);
      } else {
        window.location.href = './pages/post.html?id=' + id;
      }
    }

    function goToPublish() {
      if (!userInfo) {
        postMessage({ type: 'login' });
        return;
      }
      if (isInMiniProgram()) {
        navigateTo('/pages/publish/publish');
      } else {
        window.location.href = './pages/publish.html';
      }
    }

    function switchTab(tab) {
      if (tab === 'messages') {
        if (isInMiniProgram()) {
          navigateTo('/pages/messages/messages');
        } else {
          window.location.href = './pages/messages.html';
        }
      } else if (tab === 'profile') {
        if (isInMiniProgram()) {
          navigateTo('/pages/profile/profile');
        } else {
          window.location.href = './pages/profile.html';
        }
      }
    }

    // ========== 无限滚动 ==========

    window.addEventListener('scroll', function() {
      const scrollTop = window.scrollY;
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;

      if (scrollTop + windowHeight >= documentHeight - 100) {
        loadPosts(true);
      }
    });

    // ========== 下拉刷新（小程序环境） ==========

    if (isInMiniProgram() && window.wx.miniProgram) {
      // 小程序会通过 postMessage 通知刷新
    }
  </script>
</body>

</html>
