<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>消息</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }

    /* Tab 切换 */
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
    .tab-item { flex: 1; text-align: center; padding: 14px; font-size: 15px; color: #666; cursor: pointer; position: relative; }
    .tab-item.active { color: #3054EB; font-weight: 500; }
    .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: #3054EB; border-radius: 1px; }

    /* 消息列表 */
    .message-list { padding: 10px; }

    .message-item { display: flex; align-items: center; background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
    .msg-avatar { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
    .msg-body { flex: 1; margin-left: 12px; min-width: 0; }
    .msg-header { display: flex; align-items: center; justify-content: space-between; }
    .msg-sender { font-size: 15px; color: #333; font-weight: 500; }
    .msg-time { font-size: 12px; color: #999; }
    .msg-content { font-size: 14px; color: #666; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg-related { font-size: 12px; color: #3054EB; margin-top: 4px; }

    .unread-dot { width: 8px; height: 8px; background: #E91E63; border-radius: 50%; flex-shrink: 0; }

    /* 任务对话特殊样式 */
    .task-item { }
    .task-tag { display: inline-block; padding: 2px 6px; background: #FFF3E0; color: #FF9800; border-radius: 4px; font-size: 12px; margin-right: 6px; }

    /* 空状态 */
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* 加载状态 */
    .loading { text-align: center; padding: 20px; color: #999; }

    /* 底部导航 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 99; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: #3054EB; }
    .nav-icon { width: 20px; height: 20px; margin-bottom: 2px; }
  </style>
</head>

<body>
  <div class="container">
    <!-- Tab 切换 -->
    <div class="tabs">
      <div class="tab-item active" id="tabTask" onclick="switchTab('task')">任务对话</div>
      <div class="tab-item" id="tabComment" onclick="switchTab('comment')">评论</div>
      <div class="tab-item" id="tabLike" onclick="switchTab('like')">点赞</div>
    </div>

    <!-- 消息列表 -->
    <div class="message-list" id="messageList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="switchNav('home')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </div>
    <div class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <span>消息</span>
    </div>
    <div class="nav-item" onclick="switchNav('profile')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>我的</span>
    </div>
  </div>

  <script>
    // ========== 环境检测 ==========

    function isInMiniProgram() {
      return window.__wxjs_environment === 'miniprogram' || (window.wx && window.wx.miniProgram);
    }

    function postMessage(data) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.postMessage({ data });
      }
    }

    function navigateTo(url) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.navigateTo({ url });
      } else {
        window.location.href = url;
      }
    }

    // ========== 用户信息 ==========

    let userInfo = null;

    function getHashParams() {
      const hash = window.location.hash.slice(1);
      if (!hash) return {};
      const params = {};
      hash.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    // ========== 数据 ==========

    let currentTab = 'task';
    let conversations = [];

    document.addEventListener('DOMContentLoaded', async function() {
      // 获取用户信息
      const hashParams = getHashParams();
      if (hashParams.openid) {
        userInfo = { openid: hashParams.openid, id: hashParams.userId };
      }

      if (userInfo?.id) {
        await loadMessages();
      } else {
        showEmpty('请先登录');
      }
    });

    function switchTab(tab) {
      currentTab = tab;

      // 更新 Tab 样式
      document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

      loadMessages();
    }

    async function loadMessages() {
      const list = document.getElementById('messageList');
      list.innerHTML = '<div class="loading">加载中...</div>';

      if (!userInfo?.id) {
        showEmpty('请先登录');
        return;
      }

      if (currentTab === 'task') {
        await loadTaskConversations();
      } else if (currentTab === 'comment') {
        // 评论消息
        showEmpty('暂无评论消息');
      } else if (currentTab === 'like') {
        // 点赞消息
        showEmpty('暂无点赞消息');
      }
    }

    async function loadTaskConversations() {
      const res = await window.API.getTaskConversations(userInfo.id);
      conversations = res.success ? res.data : [];

      const list = document.getElementById('messageList');

      if (conversations.length === 0) {
        showEmpty('暂无任务对话');
        return;
      }

      list.innerHTML = conversations.map(conv => `
        <div class="message-item task-item" onclick="goToChat('${conv.taskId}', '${conv.postId}', '${conv.otherUser.id}')">
          <img class="msg-avatar" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg">
          <div class="msg-body">
            <div class="msg-header">
              <span class="msg-sender">${conv.otherUser.nickname}</span>
              <span class="msg-time">${conv.created_at}</span>
            </div>
            <div class="msg-content">
              <span class="task-tag">${conv.isOwner ? '发布者' : '接取者'}</span>
              ${conv.postTitle}
            </div>
          </div>
        </div>
      `).join('');
    }

    function showEmpty(text) {
      const list = document.getElementById('messageList');
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">${text}</div>
        </div>
      `;
    }

    function goToChat(taskId, postId, otherUserId) {
      if (isInMiniProgram()) {
        navigateTo(`/pages/chat/chat?taskId=${taskId}&postId=${postId}&otherUserId=${otherUserId}`);
      } else {
        window.location.href = `./chat.html?taskId=${taskId}&postId=${postId}&otherUserId=${otherUserId}`;
      }
    }

    function switchNav(tab) {
      if (tab === 'home') {
        if (isInMiniProgram()) {
          navigateTo('/pages/index/index');
        } else {
          window.location.href = '../websh.html';
        }
      } else if (tab === 'profile') {
        if (isInMiniProgram()) {
          navigateTo('/pages/profile/profile');
        } else {
          window.location.href = './profile.html';
        }
      }
    }
  </script>
</body>

</html>
