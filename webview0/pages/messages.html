<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>消息</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .tabs {
      display: flex;
      background: #fff;
      padding: 12px 0;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      font-size: 28px;
      color: #666;
      padding: 12px;
    }
    .tab-item.active {
      color: #3054EB;
      border-bottom: 2px solid #3054EB;
    }
    .message-list {
      padding: 16px;
      padding-bottom: 100px;
    }
    .message-item {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .message-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }
    .message-info {
      flex: 1;
      margin-left: 12px;
    }
    .message-title {
      font-size: 28px;
      color: #333;
      margin-bottom: 4px;
    }
    .message-content {
      font-size: 24px;
      color: #999;
    }
    .message-time {
      font-size: 22px;
      color: #999;
    }
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 26px;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Tab 切换 -->
    <view class="tabs">
      <view class="tab-item active" onclick="switchTab('task')">任务对话</view>
      <view class="tab-item" onclick="switchTab('system')">系统消息</view>
    </view>

    <!-- 消息列表 -->
    <view class="message-list" id="messageList">
      <view class="loading">
        <text>加载中...</text>
      </view>
    </view>
  </div>

  <!-- 底部导航 -->
  <view class="bottom-nav">
    <view class="nav-item" onclick="switchNav('home')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <text>首页</text>
    </view>
    <view class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <text>消息</text>
    </view>
    <view class="nav-item" onclick="switchNav('profile')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
      <text>我的</text>
    </view>
  </view>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let currentTab = 'task';
    let userInfo = null;

    document.addEventListener('DOMContentLoaded', async function() {
      userInfo = window.webview.getUserInfo();
      loadMessages();
    });

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-item').forEach(item => {
        item.classList.remove('active');
      });
      event.target.classList.add('active');
      loadMessages();
    }

    async function loadMessages() {
      const messageList = document.getElementById('messageList');

      if (!userInfo) {
        messageList.innerHTML = '<view class="empty-state"><text>请先登录</text></view>';
        return;
      }

      if (currentTab === 'task') {
        // 任务对话（模拟数据）
        messageList.innerHTML = `
          <view class="empty-state">
            <text>暂无任务对话</text>
          </view>
        `;
      } else {
        // 系统消息（模拟数据）
        messageList.innerHTML = `
          <view class="empty-state">
            <text>暂无系统消息</text>
          </view>
        `;
      }
    }

    function switchNav(tab) {
      if (tab === 'home') {
        window.location.href = '../websh.html';
      } else if (tab === 'profile') {
        window.location.href = './profile.html';
      }
    }
  </script>
</body>

</html>
