<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>用户空间</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script src="../js/api.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }

    /* 用户信息头部 */
    .user-header { background: linear-gradient(135deg, #3054EB, #4A7AF7); padding: 30px 20px; text-align: center; position: relative; }
    .user-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-bottom: 12px; }
    .user-nickname { font-size: 20px; color: #fff; font-weight: 600; margin-bottom: 4px; }
    .user-id { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

    /* 关注按钮 */
    .follow-btn { padding: 8px 24px; background: #fff; color: #3054EB; border-radius: 20px; font-size: 14px; cursor: pointer; border: none; }
    .follow-btn.following { background: rgba(255,255,255,0.2); color: #fff; }

    /* 统计 */
    .stats { display: flex; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 15px; margin-top: 15px; }
    .stat-item { flex: 1; text-align: center; cursor: pointer; }
    .stat-num { font-size: 22px; color: #fff; font-weight: 600; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; }

    /* Tab 切换 */
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
    .tab-item { flex: 1; text-align: center; padding: 14px; font-size: 15px; color: #666; cursor: pointer; position: relative; }
    .tab-item.active { color: #3054EB; font-weight: 500; }
    .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background: #3054EB; border-radius: 1px; }

    /* 帖子列表 */
    .posts-list { padding: 10px; }
    .post-card { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; gap: 10px; cursor: pointer; }
    .post-cover { width: 100px; height: 80px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    .post-cover img { width: 100%; height: 100%; object-fit: cover; }
    .post-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .post-title { font-size: 14px; font-weight: 600; color: #333; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 6px; }
    .post-meta { display: flex; align-items: center; gap: 8px; margin-top: auto; }
    .post-category { padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    .post-category.bounty { background: #FFF3E0; color: #FF9800; }
    .post-category.qa { background: #E3F2FD; color: #2196F3; }
    .post-category.rant { background: #FCE4EC; color: #E91E63; }
    .post-time { font-size: 11px; color: #999; }
    .bounty-amount { font-size: 14px; color: #FF5722; font-weight: 600; }

    /* 空状态 */
    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .loading { text-align: center; padding: 20px; color: #999; }
  </style>
</head>

<body>
  <div class="container">
    <!-- 用户信息头部 -->
    <div class="user-header">
      <img class="user-avatar" id="userAvatar" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg" alt="avatar">
      <div class="user-nickname" id="userNickname">加载中...</div>
      <div class="user-id" id="userId"></div>
      <button class="follow-btn" id="followBtn" onclick="toggleFollow()">关注</button>

      <div class="stats">
        <div class="stat-item" onclick="goToAlbum()">
          <div class="stat-num" id="postsCount">0</div>
          <div class="stat-label">发布</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="followersCount">0</div>
          <div class="stat-label">粉丝</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="followingCount">0</div>
          <div class="stat-label">关注</div>
        </div>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tabs">
      <div class="tab-item active" id="tabBounty" onclick="switchTab('赏金任务')">赏金任务</div>
      <div class="tab-item" id="tabQA" onclick="switchTab('问答')">问答</div>
      <div class="tab-item" id="tabRant" onclick="switchTab('吐槽')">吐槽</div>
    </div>

    <!-- 帖子列表 -->
    <div class="posts-list" id="postsList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    // ========== 环境检测 ==========

    function isInMiniProgram() {
      return window.__wxjs_environment === 'miniprogram' || (window.wx && window.wx.miniProgram);
    }

    function navigateTo(url) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.navigateTo({ url });
      } else {
        window.location.href = url;
      }
    }

    function navigateBack() {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.navigateBack();
      } else {
        window.history.back();
      }
    }

    // ========== 用户信息 ==========

    let userInfo = null;
    let targetUserId = '';
    let isSelf = false;
    let isFollowing = false;
    let currentTab = '赏金任务';
    let targetUser = null;

    function getHashParams() {
      const hash = window.location.hash.slice(1);
      if (!hash) return {};
      const params = {};
      hash.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    function getQueryParams() {
      const search = window.location.search.slice(1);
      if (!search) return {};
      const params = {};
      search.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    document.addEventListener('DOMContentLoaded', async function() {
      // 获取当前用户信息
      const hashParams = getHashParams();
      if (hashParams.openid) {
        userInfo = { openid: hashParams.openid, id: hashParams.userId };
      }

      // 获取目标用户 ID
      const queryParams = getQueryParams();
      targetUserId = queryParams.id;

      if (!targetUserId) {
        document.getElementById('postsList').innerHTML = '<div class="empty">用户不存在</div>';
        return;
      }

      // 判断是否是自己
      isSelf = targetUserId === 'self' || targetUserId === userInfo?.id;
      if (isSelf && userInfo) {
        targetUserId = userInfo.id;
      }

      await loadData();
    });

    async function loadData() {
      await Promise.all([loadUserInfo(), loadPosts(), loadFollowStats()]);

      // 检查关注状态
      if (!isSelf && userInfo) {
        const res = await window.API.checkIsFollowing(userInfo.id, targetUserId);
        isFollowing = res.isFollowing;
        updateFollowBtn();
      }

      // 如果是自己，隐藏关注按钮
      if (isSelf) {
        document.getElementById('followBtn').style.display = 'none';
      }
    }

    async function loadUserInfo() {
      if (isSelf && userInfo) {
        targetUser = userInfo;
      } else {
        const res = await window.API.getUserInfo(targetUserId);
        if (res.success) {
          targetUser = res.data;
        }
      }

      if (targetUser) {
        document.getElementById('userAvatar').src = targetUser.avatar || 'https://fp1.mingdaoyun.cn/customIcon/0_lego.svg';
        document.getElementById('userNickname').textContent = targetUser.nickname || '用户';
        document.getElementById('userId').textContent = 'ID: ' + (targetUser.id || '-');
      }
    }

    async function loadFollowStats() {
      const res = await window.API.getFollowStats(targetUserId);
      if (res.success) {
        document.getElementById('followersCount').textContent = res.data.followerCount || 0;
        document.getElementById('followingCount').textContent = res.data.followingCount || 0;
      }
    }

    async function loadPosts() {
      const list = document.getElementById('postsList');
      list.innerHTML = '<div class="loading">加载中...</div>';

      const res = await window.API.getUserPosts(targetUserId, currentTab);

      if (res.success && res.data.length > 0) {
        // 更新发布数
        document.getElementById('postsCount').textContent = res.data.length;

        list.innerHTML = res.data.map(post => `
          <div class="post-card" onclick="goToDetail('${post.id}')">
            ${post.cover ? `<div class="post-cover"><img src="${post.cover}" alt="cover"></div>` : ''}
            <div class="post-main">
              <div class="post-title">${post.title}</div>
              <div class="post-meta">
                <span class="post-category ${post.category === '赏金任务' ? 'bounty' : post.category === '问答' ? 'qa' : 'rant'}">${post.category}</span>
                ${post.category === '赏金任务' ? `<span class="bounty-amount">¥${post.bounty_amount}</span>` : ''}
                <span class="post-time">${post.created_at}</span>
              </div>
            </div>
          </div>
        `).join('');
      } else {
        list.innerHTML = `<div class="empty">暂无${currentTab}内容</div>`;
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
      document.getElementById('tab' + (tab === '赏金任务' ? 'Bounty' : tab === '问答' ? 'QA' : 'Rant')).classList.add('active');
      loadPosts();
    }

    function updateFollowBtn() {
      const btn = document.getElementById('followBtn');
      btn.className = 'follow-btn ' + (isFollowing ? 'following' : '');
      btn.textContent = isFollowing ? '已关注' : '关注';
    }

    async function toggleFollow() {
      if (!userInfo) {
        if (isInMiniProgram()) {
          window.wx.miniProgram.postMessage({ data: { type: 'login' } });
        } else {
          alert('请先登录');
        }
        return;
      }

      if (isFollowing) {
        // 取消关注（暂不支持）
        alert('暂不支持取消关注');
      } else {
        const res = await window.API.followUser(userInfo.id, targetUserId);
        if (res.success) {
          isFollowing = true;
          updateFollowBtn();
          document.getElementById('followersCount').textContent = parseInt(document.getElementById('followersCount').textContent) + 1;
          alert('关注成功');
        } else {
          alert(res.error_msg || '关注失败');
        }
      }
    }

    function goToDetail(id) {
      if (isInMiniProgram()) {
        navigateTo('/pages/post/post?id=' + id);
      } else {
        window.location.href = 'post.html?id=' + id;
      }
    }

    function goToAlbum() {
      if (isInMiniProgram()) {
        navigateTo('/pages/album/album?userId=' + targetUserId);
      } else {
        window.location.href = 'album.html?userId=' + targetUserId;
      }
    }
  </script>
</body>

</html>
