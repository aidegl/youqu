<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>我的</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>

  <!-- 全局函数必须在 HTML 渲染前定义 -->
  <script>
    window.goToHome = function() {
      console.log('[Profile] goToHome');
      window.location.href = '../entrance.html';
    };
    window.goToMessages = function() {
      console.log('[Profile] goToMessages');
      window.location.href = 'messages.html';
    };
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { min-height: 100vh; background: #f5f5f5; padding-bottom: 60px; }

    /* 个人信息头部 */
    .profile-header { background: linear-gradient(135deg, #3054EB, #4A7AF7); padding: 30px 20px; text-align: center; position: relative; }
    .profile-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.3; object-fit: cover; }
    .profile-content { position: relative; z-index: 1; }

    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; margin-bottom: 12px; cursor: pointer; }
    .nickname { font-size: 20px; color: #fff; font-weight: 600; margin-bottom: 4px; cursor: pointer; }
    .user-id { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
    .edit-tip { font-size: 12px; color: rgba(255,255,255,0.6); }

    .login-btn { padding: 12px 24px; background: #fff; color: #3054EB; border-radius: 24px; font-size: 16px; cursor: pointer; border: none; margin-top: 12px; }

    /* 统计 */
    .stats { display: flex; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 15px; margin-top: 15px; }
    .stat-item { flex: 1; text-align: center; cursor: pointer; }
    .stat-num { font-size: 22px; color: #fff; font-weight: 600; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; }

    /* 菜单列表 */
    .menu-list { padding: 15px; }

    .menu-item { display: flex; align-items: center; background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
    .menu-icon { font-size: 20px; margin-right: 12px; }
    .menu-text { flex: 1; font-size: 15px; color: #333; }
    .menu-arrow { font-size: 14px; color: #999; }

    .logout-btn { background: #fff5f5; }
    .logout-btn .menu-text { color: #E91E63; }

    /* 底部导航 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 99; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 12px; cursor: pointer; }
    .nav-item.active { color: #3054EB; }
    .nav-icon { width: 24px; height: 24px; margin-bottom: 2px; }

    /* 加载状态 */
    .loading { text-align: center; padding: 20px; color: #999; }
  </style>
</head>

<body>
  <div class="container">
    <!-- 个人信息头部 -->
    <div class="profile-header">
      <img class="profile-bg" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg" alt="bg">

      <div class="profile-content">
        <!-- 未登录状态 -->
        <div id="notLoggedIn">
          <img class="avatar" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg" alt="avatar">
          <div class="nickname">未登录</div>
          <button class="login-btn" onclick="login()">登录</button>
        </div>

        <!-- 已登录状态 -->
        <div id="loggedIn" style="display: none;">
          <img class="avatar" id="userAvatar" src="" alt="avatar" onclick="editAvatar()">
          <div class="nickname" id="userNickname" onclick="editNickname()"></div>
          <div class="user-id" id="userId"></div>
          <div class="edit-tip">点击头像/昵称可修改</div>

          <div class="stats">
            <div class="stat-item" onclick="goToMyPosts()">
              <div class="stat-num" id="postsCount">0</div>
              <div class="stat-label">发布</div>
            </div>
            <div class="stat-item" onclick="goToFollowers()">
              <div class="stat-num" id="followersCount">0</div>
              <div class="stat-label">粉丝</div>
            </div>
            <div class="stat-item" onclick="goToFollowing()">
              <div class="stat-num" id="followingCount">0</div>
              <div class="stat-label">关注</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 菜单列表 -->
    <div class="menu-list">
      <div class="menu-item" onclick="goToMyPosts()">
        <span class="menu-icon">📝</span>
        <span class="menu-text">我的发布</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="goToAlbum()">
        <span class="menu-icon">📷</span>
        <span class="menu-text">我的相册</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="goToMessages()">
        <span class="menu-icon">💬</span>
        <span class="menu-text">我的消息</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="goToSettings()">
        <span class="menu-icon">⚙️</span>
        <span class="menu-text">设置</span>
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item logout-btn" id="logoutItem" style="display: none;" onclick="logout()">
        <span class="menu-icon">🚪</span>
        <span class="menu-text">退出登录</span>
        <span class="menu-arrow">›</span>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="goToHome()">
      <img class="nav-icon" src="../images/home.png" alt="首页">
      <span>首页</span>
    </div>
    <div class="nav-item" onclick="goToMessages()">
      <img class="nav-icon" src="../images/mark.png" alt="消息">
      <span>消息</span>
    </div>
    <div class="nav-item active">
      <img class="nav-icon" src="../images/people_fill.png" alt="我的">
      <span>我的</span>
    </div>
  </div>

  <script>
    // ========== 环境检测 ==========

    function isInMiniProgram() {
      return window.__wxjs_environment === 'miniprogram' || (window.wx && window.wx.miniProgram);
    }

    function postMessage(data) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.postMessage({ data });
      }
    }

    function navigateTo(url) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.navigateTo({ url });
      } else {
        window.location.href = url;
      }
    }

    function switchTab(url) {
      if (isInMiniProgram() && window.wx.miniProgram) {
        window.wx.miniProgram.switchTab({ url });
      } else {
        window.location.href = url;
      }
    }

    // ========== 用户信息 ==========

    let userInfo = null;
    let stats = { posts: 0, followers: 0, following: 0 };

    function getHashParams() {
      const hash = window.location.hash.slice(1);
      if (!hash) return {};
      const params = {};
      hash.split('&').forEach(pair => {
        const [key, value] = pair.split('=');
        if (key) params[key] = decodeURIComponent(value || '');
      });
      return params;
    }

    // 监听 hash 变化
    window.addEventListener('hashchange', async function() {
      const hashParams = getHashParams();
      if (hashParams.openid) {
        userInfo = { openid: hashParams.openid, id: hashParams.userId };
        updateUI();
        await loadStats();
      }
    });

    document.addEventListener('DOMContentLoaded', async function() {
      // 获取用户信息
      const hashParams = getHashParams();
      if (hashParams.openid) {
        userInfo = { openid: hashParams.openid, id: hashParams.userId };
        updateUI();
        await loadStats();
      }
    });

    function updateUI() {
      if (userInfo) {
        document.getElementById('notLoggedIn').style.display = 'none';
        document.getElementById('loggedIn').style.display = 'block';
        document.getElementById('logoutItem').style.display = 'flex';

        document.getElementById('userAvatar').src = userInfo.avatar || 'https://fp1.mingdaoyun.cn/customIcon/0_lego.svg';
        document.getElementById('userNickname').textContent = userInfo.nickname || '用户';
        document.getElementById('userId').textContent = 'ID: ' + (userInfo.id || '-');
      } else {
        document.getElementById('notLoggedIn').style.display = 'block';
        document.getElementById('loggedIn').style.display = 'none';
        document.getElementById('logoutItem').style.display = 'none';
      }
    }

    async function loadStats() {
      if (!userInfo?.id) return;

      // 获取发布数
      const postsRes = await window.API.getUserPosts(userInfo.id);
      stats.posts = postsRes.success ? postsRes.data?.length || 0 : 0;

      // 获取关注/粉丝数
      const followRes = await window.API.getFollowStats(userInfo.id);
      if (followRes.success) {
        stats.followers = followRes.data?.followerCount || 0;
        stats.following = followRes.data?.followingCount || 0;
      }

      document.getElementById('postsCount').textContent = stats.posts;
      document.getElementById('followersCount').textContent = stats.followers;
      document.getElementById('followingCount').textContent = stats.following;
    }

    // ========== 功能 ==========

    function login() {
      if (isInMiniProgram()) {
        postMessage({ type: 'login' });
      } else {
        alert('请在小程序中登录');
      }
    }

    function editAvatar() {
      if (!userInfo) {
        login();
        return;
      }

      if (isInMiniProgram()) {
        postMessage({ type: 'editAvatar' });
      } else {
        alert('头像修改功能需要小程序支持');
      }
    }

    function editNickname() {
      if (!userInfo) {
        login();
        return;
      }

      const newNickname = prompt('请输入新昵称', userInfo.nickname || '');
      if (newNickname && newNickname.trim()) {
        // 更新昵称
        userInfo.nickname = newNickname.trim();
        updateUI();

        if (isInMiniProgram()) {
          postMessage({ type: 'editNickname', nickname: newNickname.trim() });
        }
      }
    }

    function goToMyPosts() {
      if (!userInfo) {
        login();
        return;
      }

      if (isInMiniProgram()) {
        navigateTo('/pages/profile-space/profile-space?id=self');
      } else {
        window.location.href = 'profile-space.html?id=self';
      }
    }

    function goToAlbum() {
      if (!userInfo) {
        login();
        return;
      }

      if (isInMiniProgram()) {
        navigateTo('/pages/album/album');
      } else {
        window.location.href = 'album.html';
      }
    }

    function goToFollowers() {
      if (!userInfo) {
        login();
        return;
      }
      alert('粉丝列表功能暂未实现');
    }

    function goToFollowing() {
      if (!userInfo) {
        login();
        return;
      }
      alert('关注列表功能暂未实现');
    }

    function goToSettings() {
      alert('设置功能开发中');
    }

    function logout() {
      if (!confirm('确定要退出登录吗？')) return;

      userInfo = null;
      localStorage.removeItem('userInfo');
      updateUI();

      if (isInMiniProgram()) {
        postMessage({ type: 'logout' });
      }
    }
  </script>
</body>

</html>
