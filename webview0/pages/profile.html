<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>我的</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .profile-header {
      background: linear-gradient(135deg, #3054EB, #4A7AF7);
      padding: 40px 20px;
      text-align: center;
    }
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #fff;
      margin-bottom: 12px;
    }
    .profile-nickname {
      font-size: 32px;
      color: #fff;
      margin-bottom: 16px;
    }
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      color: #fff;
    }
    .stat-label {
      font-size: 24px;
      color: rgba(255,255,255,0.7);
    }
    .login-btn {
      padding: 16px 40px;
      background: #fff;
      color: #3054EB;
      border-radius: 24px;
      font-size: 28px;
      margin-top: 16px;
    }
    .menu-list {
      padding: 20px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .menu-icon {
      font-size: 32px;
      margin-right: 16px;
    }
    .menu-text {
      flex: 1;
      font-size: 28px;
      color: #333;
    }
    .menu-arrow {
      font-size: 24px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- 个人信息头部 -->
    <view class="profile-header" id="profileHeader">
      <view id="notLoggedIn">
        <image class="profile-avatar" src="https://fp1.mingdaoyun.cn/customIcon/0_lego.svg"></image>
        <text class="profile-nickname">未登录</text>
        <button class="login-btn" onclick="login()">登录</button>
      </view>
      <view id="loggedIn" style="display: none;">
        <image class="profile-avatar" id="userAvatar" src=""></image>
        <text class="profile-nickname" id="userNickname"></text>
        <view class="profile-stats">
          <view class="stat-item">
            <text class="stat-value" id="postsCount">0</text>
            <text class="stat-label">发布</text>
          </view>
          <view class="stat-item">
            <text class="stat-value" id="followersCount">0</text>
            <text class="stat-label">粉丝</text>
          </view>
          <view class="stat-item">
            <text class="stat-value" id="followingCount">0</text>
            <text class="stat-label">关注</text>
          </view>
        </view>
      </view>
    </view>

    <!-- 菜单列表 -->
    <view class="menu-list">
      <view class="menu-item" onclick="goToMyPosts()">
        <text class="menu-icon">📝</text>
        <text class="menu-text">我的发布</text>
        <text class="menu-arrow">›</text>
      </view>
      <view class="menu-item" onclick="goToAlbum()">
        <text class="menu-icon">📷</text>
        <text class="menu-text">我的相册</text>
        <text class="menu-arrow">›</text>
      </view>
      <view class="menu-item" onclick="goToMessages()">
        <text class="menu-icon">💬</text>
        <text class="menu-text">我的消息</text>
        <text class="menu-arrow">›</text>
      </view>
      <view class="menu-item" onclick="goToSettings()">
        <text class="menu-icon">⚙️</text>
        <text class="menu-text">设置</text>
        <text class="menu-arrow">›</text>
      </view>
      <view class="menu-item" onclick="logout()" id="logoutItem" style="display: none;">
        <text class="menu-icon">🚪</text>
        <text class="menu-text">退出登录</text>
        <text class="menu-arrow">›</text>
      </view>
    </view>
  </div>

  <!-- 底部导航 -->
  <view class="bottom-nav">
    <view class="nav-item" onclick="switchNav('home')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
      <text>首页</text>
    </view>
    <view class="nav-item" onclick="switchNav('messages')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <text>消息</text>
    </view>
    <view class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
      <text>我的</text>
    </view>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let userInfo = null;

    document.addEventListener('DOMContentLoaded', async function() {
      userInfo = window.webview.getUserInfo();
      updateUI();
    });

    function updateUI() {
      if (userInfo) {
        document.getElementById('notLoggedIn').style.display = 'none';
        document.getElementById('loggedIn').style.display = 'block';
        document.getElementById('logoutItem').style.display = 'flex';

        document.getElementById('userAvatar').src = userInfo.avatar || 'https://fp1.mingdaoyun.cn/customIcon/0_lego.svg';
        document.getElementById('userNickname').textContent = userInfo.nickname || '用户';
      } else {
        document.getElementById('notLoggedIn').style.display = 'block';
        document.getElementById('loggedIn').style.display = 'none';
        document.getElementById('logoutItem').style.display = 'none';
      }
    }

    function login() {
      // 在小程序环境下触发登录
      if (window.webview.isInMiniProgram()) {
        window.webview.postMessage({ type: 'login' });
      } else {
        alert('请在小程序中登录');
      }
    }

    function goToMyPosts() {
      if (!userInfo) {
        login();
        return;
      }
      if (window.webview.isInMiniProgram()) {
        window.webview.navigateTo('/pages/profile-space/profile-space?id=self');
      } else {
        alert('我的发布功能需要原生小程序支持');
      }
    }

    function goToAlbum() {
      if (!userInfo) {
        login();
        return;
      }
      if (window.webview.isInMiniProgram()) {
        window.webview.navigateTo('/pages/album/album');
      } else {
        alert('相册功能需要原生小程序支持');
      }
    }

    function goToMessages() {
      if (window.webview.isInMiniProgram()) {
        window.webview.switchTab('/pages/messages/messages');
      } else {
        window.location.href = './messages.html';
      }
    }

    function goToSettings() {
      alert('设置功能开发中');
    }

    function logout() {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('userInfo');
        userInfo = null;
        updateUI();
        if (window.webview.isInMiniProgram()) {
          window.webview.postMessage({ type: 'logout' });
        }
      }
    }

    function switchNav(tab) {
      if (tab === 'home') {
        window.location.href = '../websh.html';
      } else if (tab === 'messages') {
        window.location.href = './messages.html';
      }
    }
  </script>
</body>

</html>
