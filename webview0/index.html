<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>友趣员工培训</title>

  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { min-height: 100vh; background: #f5f5f5; padding-bottom: 20px; }

    /* 头部 */
    .header { padding: 12px 15px; background: #3054EB; color: #fff; }
    .header-title { font-size: 18px; font-weight: 600; }

    /* 统计卡片 */
    .stats-card { display: flex; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 10px; margin-top: 10px; }
    .stat-item { flex: 1; text-align: center; }
    .stat-value { font-size: 20px; font-weight: 600; }
    .stat-label { font-size: 11px; opacity: 0.8; }

    /* 快捷入口 */
    .quick-actions { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin: 10px 15px; }
    .action-item { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .action-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 4px; }
    .action-icon.blue { background: #E3F2FD; }
    .action-icon.orange { background: #FFF3E0; }
    .action-icon.green { background: #E8F5E9; }
    .action-icon.purple { background: #F3E5F5; }
    .action-text { font-size: 12px; color: #666; }

    /* 考试入口 */
    .exam-card { background: linear-gradient(135deg, #FF9800, #FFB74D); border-radius: 8px; padding: 12px 15px; margin: 10px 15px; color: #fff; cursor: pointer; }
    .exam-header { display: flex; align-items: center; }
    .exam-icon { font-size: 24px; margin-right: 8px; }
    .exam-title { font-size: 16px; font-weight: 600; }
    .exam-desc { font-size: 12px; opacity: 0.9; margin-top: 4px; }
    .exam-btn { display: inline-block; padding: 6px 12px; background: rgba(255,255,255,0.3); border-radius: 4px; font-size: 12px; margin-top: 8px; }

    /* 课程区域 */
    .section { margin: 10px 15px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .section-title { font-size: 15px; font-weight: 600; color: #333; }
    .section-more { font-size: 12px; color: #3054EB; cursor: pointer; }

    .course-card { display: flex; background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
    .course-card.completed { background: #E8F5E9; }
    .course-icon { width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #f5f5f5; margin-right: 10px; }
    .course-info { flex: 1; }
    .course-top { display: flex; align-items: center; justify-content: space-between; }
    .course-title { font-size: 14px; font-weight: 500; color: #333; }
    .course-status { font-size: 10px; padding: 2px 6px; border-radius: 2px; }
    .course-status.done { background: #4CAF50; color: #fff; }
    .course-status.progress { background: #FF9800; color: #fff; }
    .course-status.new { background: #eee; color: #666; }
    .course-status.required { background: #E91E63; color: #fff; }
    .course-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .course-duration { font-size: 11px; color: #999; }
    .progress-bar { width: 60px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4CAF50; border-radius: 2px; }
    .progress-text { font-size: 11px; color: #666; }

    /* 学习记录 */
    .record-card { background: #fff; border-radius: 8px; padding: 12px; margin: 10px 15px; }
    .record-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .record-title { font-size: 14px; font-weight: 600; color: #333; }
    .record-time { font-size: 11px; color: #999; }
    .record-list { max-height: 120px; overflow-y: auto; }
    .record-item { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .record-icon { font-size: 14px; margin-right: 6px; }
    .record-text { flex: 1; font-size: 12px; color: #666; }
    .record-date { font-size: 11px; color: #999; }

    /* 底部版权 */
    .footer { text-align: center; padding: 20px; color: #999; font-size: 11px; }

    /* 登录弹窗 */
    .login-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .login-modal.show { display: flex; }
    .login-box { background: #fff; border-radius: 12px; padding: 24px; width: 280px; text-align: center; }
    .login-box-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; }
    .login-input { width: 100%; height: 44px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
    .login-input:focus { border-color: #3054EB; }
    .login-btn { width: 100%; height: 44px; background: #3054EB; color: #fff; border-radius: 8px; font-size: 16px; border: none; cursor: pointer; margin-top: 8px; }
    .login-btn:active { background: #2544CB; }
    .login-close { font-size: 12px; color: #999; margin-top: 16px; cursor: pointer; }
    .login-error { display: none; color: #E91E63; font-size: 13px; margin-top: 12px; }
    .login-error.show { display: block; }
  </style>
</head>

<body>
  <div class="container">
    <!-- 头部区域 -->
    <header class="header">
      <div class="header-title">友趣员工培训</div>
      <div class="stats-card">
        <div class="stat-item"><div class="stat-value">5</div><div class="stat-label">必修课程</div></div>
        <div class="stat-item"><div class="stat-value">1</div><div class="stat-label">已完成</div></div>
        <div class="stat-item"><div class="stat-value">2.5h</div><div class="stat-label">学习时长</div></div>
        <div class="stat-item"><div class="stat-value">20%</div><div class="stat-label">进度</div></div>
      </div>
    </header>

    <!-- 快捷入口 -->
    <div class="quick-actions">
      <div class="action-item" onclick="showLoginModal()"><div class="action-icon blue">📖</div><div class="action-text">课程中心</div></div>
      <div class="action-item" onclick="showLoginModal()"><div class="action-icon orange">📝</div><div class="action-text">在线考试</div></div>
      <div class="action-item" onclick="showLoginModal()"><div class="action-icon green">📋</div><div class="action-text">学习记录</div></div>
      <div class="action-item" onclick="showLoginModal()"><div class="action-icon purple">📁</div><div class="action-text">学习资料</div></div>
    </div>

    <!-- 考试入口 -->
    <div class="exam-card" onclick="showLoginModal()">
      <div class="exam-header">
        <div class="exam-icon">🎯</div>
        <div><div class="exam-title">入职考试</div><div class="exam-desc">完成必修课程后参加考试</div></div>
      </div>
      <div class="exam-btn">开始考试 →</div>
    </div>

    <!-- 必修课程 -->
    <section class="section">
      <div class="section-header">
        <div class="section-title">必修课程</div>
        <div class="section-more" onclick="showLoginModal()">查看全部 ›</div>
      </div>
      <div id="courseList"></div>
    </section>

    <!-- 学习记录 -->
    <div class="record-card">
      <div class="record-header"><div class="record-title">近期学习记录</div><div class="record-time">今日学习 2.5h</div></div>
      <div class="record-list" id="recordList"></div>
    </div>

    <!-- 底部版权 -->
    <div class="footer">
      <div>友趣科技有限公司 © 2024</div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div class="login-modal" id="loginModal">
    <div class="login-box">
      <div class="login-box-title">员工登录</div>
      <input type="text" class="login-input" id="empId" placeholder="请输入员工号" maxlength="20">
      <input type="password" class="login-input" id="empPwd" placeholder="请输入密码" maxlength="20">
      <button class="login-btn" onclick="doFakeLogin()">登录</button>
      <div class="login-error" id="loginError">员工号或密码错误</div>
      <div class="login-close" onclick="hideLoginModal()">取消</div>
    </div>
  </div>

  <script>
    // 小程序环境检测
    function isInMiniProgram() {
      return window.__wxjs_environment === 'miniprogram' || (window.wx && window.wx.miniProgram);
    }

    // 课程数据
    const courses = [
      { id: 1, title: '公司规章制度', icon: '📋', duration: '45分钟', progress: 100, completed: true, required: true },
      { id: 2, title: '安全培训', icon: '🛡️', duration: '60分钟', progress: 80, completed: false, required: true },
      { id: 3, title: '业务流程培训', icon: '📊', duration: '90分钟', progress: 50, completed: false, required: true },
      { id: 4, title: '团队协作', icon: '👥', duration: '50分钟', progress: 30, completed: false, required: true },
      { id: 5, title: '产品知识', icon: '📦', duration: '70分钟', progress: 0, completed: false, required: true }
    ];

    // 学习记录
    const records = [
      { icon: '✅', text: '完成《公司规章制度》', date: '今天 14:30' },
      { icon: '📖', text: '学习《安全培训》第三章', date: '今天 11:20' },
      { icon: '📝', text: '通过章节测验', date: '昨天 16:45' },
      { icon: '📖', text: '学习《业务流程培训》第一章', date: '昨天 10:00' }
    ];

    // 渲染
    document.addEventListener('DOMContentLoaded', function() {
      // 课程列表
      document.getElementById('courseList').innerHTML = courses.map(c => `
        <div class="course-card ${c.completed ? 'completed' : ''}" onclick="showLoginModal()">
          <div class="course-icon">${c.icon}</div>
          <div class="course-info">
            <div class="course-top">
              <div class="course-title">${c.title}</div>
              ${c.required ? '<span class="course-status required">必修</span>' : ''}
            </div>
            <div class="course-meta">
              <div class="course-duration">⏱ ${c.duration}</div>
              <div class="progress-bar"><div class="progress-fill" style="width: ${c.progress}%"></div></div>
              <div class="progress-text">${c.progress}%</div>
            </div>
          </div>
        </div>
      `).join('');

      // 学习记录
      document.getElementById('recordList').innerHTML = records.map(r => `
        <div class="record-item" onclick="showLoginModal()">
          <div class="record-icon">${r.icon}</div>
          <div class="record-text">${r.text}</div>
          <div class="record-date">${r.date}</div>
        </div>
      `).join('');
    });

    // 显示登录弹窗
    function showLoginModal() {
      document.getElementById('loginModal').classList.add('show');
      document.getElementById('empId').value = '';
      document.getElementById('empPwd').value = '';
      document.getElementById('loginError').classList.remove('show');
    }

    // 隐藏登录弹窗
    function hideLoginModal() {
      document.getElementById('loginModal').classList.remove('show');
    }

    // 假登录 - 永远失败
    function doFakeLogin() {
      const empId = document.getElementById('empId').value.trim();
      const empPwd = document.getElementById('empPwd').value.trim();

      // 无论输入什么，都显示错误
      document.getElementById('loginError').classList.add('show');
    }
  </script>
</body>

</html>
